spring:
  autoconfigure:
    exclude:
      # --- Ollama (OpenAI odakli profil) ---
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      # --- Anthropic ---
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      # --- Chroma bu profilde kapali ---
      - org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
      # --- Chat memory bu bolumde gerekmiyor ---
      - org.springframework.ai.model.chat.memory.repository.jdbc.autoconfigure.JdbcChatMemoryRepositoryAutoConfiguration
      # --- MCP bu profilde gerekmiyor ---
      - org.springframework.ai.mcp.client.common.autoconfigure.McpClientAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.McpServerAutoConfiguration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 1536
        table-name: vector_store_b9
