# Spring AI Demo — Gelistirme (Development) Profil Yapilandirmasi

spring:
  # VERITABANI (Docker Compose)
  datasource:
    url: jdbc:postgresql://localhost:5432/vectordb
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true   # SQL loglarini ac (debug)


# GELISTIRME LOGLAMA (DETAYLI)
logging:
  level:
    root: INFO
    com.javaai: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG                    # SQL sorgulari
    org.hibernate.type.descriptor.sql: TRACE    # SQL parametreleri
